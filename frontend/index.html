
<!-- network_device_monitor/frontend/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI平台部设备管理系统</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.loli.net/css?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e6e6e6;
    }
    .status-online {
      background: linear-gradient(90deg, rgba(46, 213, 115, 0.2) 0%, rgba(46, 213, 115, 0.1) 100%);
      border-left: 4px solid #2ed573;
    }
    .status-offline {
      background: linear-gradient(90deg, rgba(255, 71, 87, 0.2) 0%, rgba(255, 71, 87, 0.1) 100%);
      border-left: 4px solid #ff4757;
    }
    .sidebar {
      background: linear-gradient(180deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    }
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .glow-on-hover:hover {
      box-shadow: 0 0 15px rgba(100, 149, 237, 0.5);
    }
    .config-card {
      background: rgba(31, 41, 55, 0.8);
      backdrop-filter: blur(10px);
    }
    .loading-row {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6;
    }
    .version-cell {
      white-space: pre-wrap;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* 分组颜色 */
    .group-NB2 {
      background: rgba(59, 130, 246, 0.1);
    }
    .group-服务器 {
      background: rgba(16, 185, 129, 0.1);
    }
    .group-网络设备 {
      background: rgba(139, 92, 246, 0.1);
    }
    .group-存储设备 {
      background: rgba(245, 158, 11, 0.1);
    }
    .group-header {
      background: rgba(255, 255, 255, 0.1);
      font-weight: 600;
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    }
    .user-input {
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      padding: 2px 8px;
      font-weight: 500;
    }
    .user-input:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
    }
  </style>
</head>
<body>
  <div class="particles" id="particles-js"></div>
  <div class="flex h-screen">
    <!-- 侧边栏 -->
    <div class="sidebar w-64 p-4 shadow-lg">
      <h1 class="text-2xl font-bold text-center mb-8 text-white">
        <i class="fas fa-network-wired mr-2"></i>设备监控
      </h1>
      <nav>
        <ul>
          <li class="mb-2">
            <a href="#" class="block p-3 rounded-lg bg-indigo-700 text-white glow-on-hover transition-all duration-300">
              <i class="fas fa-tachometer-alt mr-2"></i>监控面板
            </a>
          </li>
          <li class="mb-2">
            <a href="config.html" class="block p-3 rounded-lg hover:bg-indigo-600 text-gray-300 transition-all duration-300">
              <i class="fas fa-cog mr-2"></i>系统配置
            </a>
          </li>
        </ul>
      </nav>
      <div class="mt-auto pt-4 border-t border-gray-700">
        <div class="text-center text-gray-400 text-sm">
          <p>最后更新: <span id="last-update">2025-09-23 06:46:40</span></p>
          <p class="mt-2">自动刷新: <span id="refresh-status">开启</span></p>
        </div>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="flex-1 overflow-auto p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-white">
          <i class="fas fa-server mr-2"></i>AI平台部设备管理系统
        </h2>
        <div>
          <button id="refresh-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg mr-2 transition-all duration-300 glow-on-hover">
            <i class="fas fa-sync-alt mr-2"></i>立即刷新
          </button>
          <button id="add-device-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-all duration-300 glow-on-hover">
            <i class="fas fa-plus mr-2"></i>添加设备
          </button>
        </div>
      </div>

      <!-- 设备表格 -->
      <div class="bg-gray-800 rounded-xl shadow-lg overflow-hidden">
        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-700">
            <thead class="bg-gray-700">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">板卡IP</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">网络状态</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">系统版本</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">在线时长</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">磁盘占用</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">CPU占用</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">使用者</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">分组</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">更新时间</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-300 uppercase tracking-wider">操作</th>
              </tr>
            </thead>
            <tbody id="device-table-body" class="bg-gray-800 divide-y divide-gray-700">
              <!-- 设备数据将通过JS动态加载 -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- 添加设备模态框 -->
      <div id="add-device-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-gray-800 rounded-lg shadow-xl w-full max-w-md">
          <div class="px-6 py-4 border-b border-gray-700">
            <h3 class="text-lg font-semibold text-white">添加新设备</h3>
          </div>
          <div class="p-6">
            <div class="mb-4">
              <label class="block text-gray-300 text-sm font-medium mb-2" for="device-ip">设备IP</label>
              <input type="text" id="device-ip" class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 w-full text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="例如: 192.168.1.100">
            </div>
            <div class="mb-4">
              <label class="block text-gray-300 text-sm font-medium mb-2" for="device-group">设备分组</label>
              <select id="device-group" class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 w-full text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <option value="NB2">NB2</option>
                <option value="服务器">服务器</option>
                <option value="网络设备">网络设备</option>
                <option value="存储设备">存储设备</option>
              </select>
            </div>
          </div>
          <div class="px-6 py-4 border-t border-gray-700 flex justify-end">
            <button id="cancel-add-device" class="px-4 py-2 text-gray-300 hover:text-white mr-2">取消</button>
            <button id="confirm-add-device" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-all duration-300">
              <span id="confirm-text">确认添加</span>
              <span id="loading-spinner" class="hidden ml-2"><i class="fas fa-circle-notch fa-spin"></i></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
  <script src="monitor.js"></script>
  <script>
    // 粒子效果初始化
    document.addEventListener('DOMContentLoaded', function() {
      particlesJS('particles-js', {
        particles: {
          number: { value: 80, density: { enable: true, value_area: 800 } },
          color: { value: "#3b82f6" },
          shape: { type: "circle" },
          opacity: { value: 0.5, random: true },
          size: { value: 3, random: true },
          line_linked: { enable: true, distance: 150, color: "#3b82f6", opacity: 0.4, width: 1 },
          move: { enable: true, speed: 2, direction: "none", random: true, straight: false, out_mode: "out" }
        },
        interactivity: {
          detect_on: "canvas",
          events: {
            onhover: { enable: true, mode: "repulse" },
            onclick: { enable: true, mode: "push" }
          }
        }
      });

      // 初始化加载设备列表
      refreshDeviceList();
      
      // 绑定添加设备按钮
      document.getElementById('add-device-btn').addEventListener('click', function() {
        document.getElementById('add-device-modal').classList.remove('hidden');
        document.getElementById('device-ip').value = '';
        document.getElementById('device-group').value = 'NB2';
      });
      
      // 绑定取消添加设备按钮
      document.getElementById('cancel-add-device').addEventListener('click', function() {
        document.getElementById('add-device-modal').classList.add('hidden');
      });
      
      // 绑定确认添加设备按钮
      document.getElementById('confirm-add-device').addEventListener('click', function() {
        const ip = document.getElementById('device-ip').value.trim();
        const group = document.getElementById('device-group').value;
        
        if (ip) {
          document.getElementById('confirm-text').classList.add('hidden');
          document.getElementById('loading-spinner').classList.remove('hidden');
          
          addDevice(ip, group).finally(() => {
            document.getElementById('confirm-text').classList.remove('hidden');
            document.getElementById('loading-spinner').classList.add('hidden');
            document.getElementById('add-device-modal').classList.add('hidden');
          });
        }
      });
    });
  </script>
</body>
</html>
